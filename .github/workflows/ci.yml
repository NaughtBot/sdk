name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: pnpm install

      - run: pnpm build

      - run: pnpm vitest run

      - run: pnpm biome lint src/

      - run: pnpm biome format --error-on-warnings src/
